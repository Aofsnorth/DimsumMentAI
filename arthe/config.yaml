bot:
  display_name: "Elysia"
  mention_name: "@Arthenyxx"
  auth_mode: "offline"

server:
  address: "127.0.0.1:19132"
  use_tls: false

skin:
  path: "imports/skins/Elysia-Honkai.png"
  geometry_path: "imports/geometry/mobs.json"
  geometry_name: "geometry.humanoid.customSlim"
  apply_on_first_join: true

chat:
  mode: "all"
  queue_mode: "per_player"

llm:
  provider: "nvidia_nim"
  api_key: "${NVIDIA_API_KEY}"
  model: "qwen/qwen-80b-instruct"
  base_url: "https://integrate.api.nvidia.com/v1"
  max_context_tokens: 4096

camera:
  enabled: true
  tick_min: 40
  tick_max: 60
  view_radius: 10
  player_eye_height: 1.62

memory:
  storage: "both"
  file_path: "data/memory/"
  auto_save_interval: 60

logging:
  level: "info"
  console: true
  file:
    enabled: true
    path: "logs/elysiabot.log"
    max_size_mb: 10
    max_backups: 3
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    level: "error"
