# ============================================
#  Minecraft Bedrock AI Bot Configuration
# ============================================

# --- Server Settings ---
server:
  host: "127.0.0.1"
  port: 19132
  offline: true # true = no Xbox Live auth (local server)

# --- Bot Identity ---
bot:
  name: "Luna" # In-game display name
  language: "Indonesian" # AI reply language, e.g. "English", "Indonesian", "Japanese"
  log_level: "info" # debug, info, warn, or error
  debug: true # Enable visualizer debug features (break, place, inventory buttons)

# --- Skin & Geometry ---
skin:
  image_path: "imports/skins/image/Anime-thing-on-planetminecraft-com.png"
  arm_size: "slim" # "slim" (Alex) or "wide" (Steve)

# --- AI & LLM Settings ---
# Supported providers (all OpenAI-compatible chat-completion format):
#   - nvidia              → uses https://integrate.api.nvidia.com (env: NVIDIA_API_KEY)
#   - minimax             → uses https://api.minimax.io/v1 (env: MINIMAX_API_KEY)
#   - opengateway         → requires base_url (env: OPENAI_API_KEY)
#   - openai_compatible   → generic; requires base_url (env: OPENAI_API_KEY)
#   - none                → disable AI
ai:
  provider: "nvidia"
  model: "openai/gpt-oss-120b"
  api_key: ""
  base_url: "" # leave empty to use provider default. Required for opengateway/openai_compatible.
  main_player: "OnyxStygian"
  respond_only_to_linked_player: false
  respond_only_when_tagged: false # true = only respond when tagged/named in chat (e.g. Luna or @Luna)
  custom_personality: "" # Custom LLM personality prompt override (leave empty to use default)

# --- Chat Throttle Settings ---
chat:
  duplicate_window_sec: 3 # Same player + same message within N seconds is dropped
  rate_limit_window_sec: 10 # Window for global flood protection
  max_messages_per_window: 100 # Max messages handled across all players in rate window
